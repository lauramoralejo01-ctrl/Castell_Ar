<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

    <a-scene
        embedded
        arjs="sourceType: webcam;">

        <a-marker preset="hiro">

            <!-- Luz ambiente -->
            <a-light
                type="ambient"
                intensity="1">
            </a-light>

            <!-- Luz direccional -->
            <a-light
                type="directional"
                intensity="1"
                position="1 1 1">
            </a-light>

            <!-- Modelo GLB -->
            <a-entity
                gltf-model="url(Cub.glb)"
                position="0 0 0"
                rotation="0 0 0"
                scale="0.2 0.2 0.2">
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
